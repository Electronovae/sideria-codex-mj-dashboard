<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidéria — Architecture Narrative</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --parch: #F2EBD9; --parch-mid: #E6DCC0; --parch-dark: #C4A96A;
  --ink: #18140C; --ink-mid: #3D3020; --ink-light: #6B6050;
  --blue: #1A2E4A; --gold: #9A6E1A; --gold-light: #C8960E;
}
body { background: var(--parch); color: var(--ink); font-family: 'Crimson Pro', Georgia, serif; font-size: 15px; line-height: 1.6; }
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap');

.header { background: var(--blue); padding: 1.4rem 2rem 1rem; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: baseline; gap: 1.5rem; margin-bottom: 0.8rem; }
.header h1 { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 600; color: var(--gold-light); letter-spacing: 0.08em; }
.header-sub { font-style: italic; color: rgba(200,150,14,0.55); font-size: 0.9rem; }
.controls { display: flex; gap: 0.5rem; flex-wrap: wrap; }
.filter-btn { font-family: 'Crimson Pro', serif; font-size: 0.8rem; letter-spacing: 0.05em; padding: 4px 12px; border: 1px solid rgba(200,150,14,0.35); border-radius: 2px; cursor: pointer; transition: all 0.15s; background: transparent; color: rgba(200,150,14,0.6); }
.filter-btn:hover { border-color: var(--gold-light); color: var(--gold-light); }
.filter-btn.active { background: var(--gold); color: var(--blue); border-color: var(--gold); font-weight: 600; }

.main { padding: 1.5rem 2rem; max-width: 1400px; }

.ruler-wrap { position: sticky; top: 108px; z-index: 90; background: var(--parch); padding: 0.5rem 0 0.4rem; border-bottom: 1px solid var(--parch-dark); margin-bottom: 0.8rem; }
.phase-bands { display: grid; grid-template-columns: 160px 1fr; margin-bottom: 0.4rem; }
.phase-bands-inner { display: flex; height: 16px; border-radius: 2px; overflow: hidden; }
.phase-band { display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-size: 0.55rem; letter-spacing: 0.08em; font-weight: 600; }
.phase-band.early { background: rgba(42,74,53,0.18); color: #2A4A35; flex: 10; }
.phase-band.mid   { background: rgba(61,42,90,0.15);  color: #3D2A5A; flex: 20; }
.phase-band.late  { background: rgba(139,26,26,0.12); color: #8B1A1A; flex: 10; }

.ruler { display: grid; grid-template-columns: 160px 1fr; }
.ruler-label { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--ink-light); letter-spacing: 0.1em; display: flex; align-items: flex-end; padding-bottom: 4px; }
.ruler-ticks { display: flex; height: 26px; align-items: flex-end; }
.tick { flex: 1; text-align: center; font-family: 'Cinzel', serif; font-size: 0.58rem; color: var(--ink-light); border-left: 1px solid var(--parch-dark); display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 2px; }
.tick.major { border-left-color: var(--gold); color: var(--gold); font-weight: 600; }
.tick-mark { width: 1px; height: 7px; background: currentColor; margin: 0 auto 2px; }
.tick.major .tick-mark { height: 13px; }

.arc-row { display: grid; grid-template-columns: 160px 1fr; margin-bottom: 6px; align-items: center; min-height: 42px; transition: opacity 0.2s; }
.arc-row.hidden { opacity: 0.1; pointer-events: none; }
.arc-name { font-family: 'Crimson Pro', serif; font-size: 0.82rem; font-weight: 600; color: var(--ink-mid); padding-right: 12px; line-height: 1.3; }
.arc-name small { display: block; font-weight: 300; font-style: italic; font-size: 0.7rem; color: var(--ink-light); margin-top: 1px; }
.arc-track { position: relative; height: 42px; }
.arc-bar-inner { display: flex; width: 100%; height: 100%; position: absolute; }
.acte-seg { height: 28px; top: 50%; transform: translateY(-50%); position: absolute; cursor: pointer; transition: filter 0.12s; border-right: 1px solid rgba(255,255,255,0.15); display: flex; align-items: flex-end; padding-bottom: 3px; padding-left: 4px; overflow: hidden; }
.acte-seg:hover { filter: brightness(1.15); }
.acte-seg-label { font-size: 0.55rem; color: rgba(255,255,255,0.65); font-family: 'Cinzel', serif; pointer-events: none; white-space: nowrap; }
.arc-group-sep { border: none; border-top: 1px solid var(--parch-mid); margin: 6px 0 6px 160px; }

.legend { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--parch-dark); display: flex; flex-wrap: wrap; gap: 8px 20px; font-size: 0.78rem; color: var(--ink-light); }
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-swatch { width: 14px; height: 8px; border-radius: 1px; }

.panel-overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(24,20,12,0.5); align-items: flex-start; justify-content: flex-end; padding-top: 60px; }
.panel-overlay.open { display: flex; }
.panel { width: 380px; max-height: calc(100vh - 80px); overflow-y: auto; background: var(--parch); border-left: 3px solid var(--gold); padding: 1.5rem; position: relative; }
.panel-close { position: absolute; top: 1rem; right: 1rem; background: none; border: 1px solid var(--parch-dark); color: var(--ink-light); width: 26px; height: 26px; border-radius: 2px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
.panel-close:hover { background: var(--parch-mid); }
.panel-badge { display: inline-block; font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 2px; margin-bottom: 0.5rem; color: white; }
.panel h2 { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 600; color: var(--blue); margin-bottom: 0.2rem; }
.panel-levels { font-style: italic; font-size: 0.82rem; color: var(--ink-light); margin-bottom: 1rem; }
.panel-sec-title { font-family: 'Cinzel', serif; font-size: 0.58rem; letter-spacing: 0.12em; color: var(--gold); border-bottom: 1px solid var(--parch-dark); padding-bottom: 3px; margin-bottom: 0.5rem; margin-top: 1rem; }
.panel p, .panel li { font-size: 0.88rem; color: var(--ink-mid); line-height: 1.6; }
.panel ul { padding-left: 1.2rem; }
.panel li { margin-bottom: 3px; }
.acte-detail { padding: 8px 10px; border-radius: 2px; margin-bottom: 6px; border-left: 3px solid; }
.quete-list { display: flex; flex-direction: column; gap: 4px; }
.quete-item { display: flex; align-items: baseline; gap: 8px; padding: 5px 8px; border-radius: 2px; border: 1px solid transparent; }
.quete-id { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--ink-light); flex-shrink: 0; }
.quete-lvl { font-size: 0.75rem; color: var(--ink-light); font-style: italic; margin-left: auto; flex-shrink: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>Sidéria — Architecture Narrative</h1>
    <span class="header-sub">Vue d'ensemble des arcs</span>
  </div>
  <div class="controls" id="filters"></div>
</div>

<div class="main">
  <div class="ruler-wrap">
    <div class="phase-bands">
      <div></div>
      <div class="phase-bands-inner">
        <div class="phase-band early">Bas niveau · 1–10</div>
        <div class="phase-band mid">Milieu de campagne · 10–30</div>
        <div class="phase-band late">Final · 30–40</div>
      </div>
    </div>
    <div class="ruler">
      <div class="ruler-label">Niveaux</div>
      <div class="ruler-ticks" id="ruler-ticks"></div>
    </div>
  </div>

  <div id="timeline"></div>

  <div class="legend" id="legend"></div>
</div>

<div class="panel-overlay" id="panel-overlay">
  <div class="panel">
    <button class="panel-close" id="panel-close">✕</button>
    <div id="panel-content"></div>
  </div>
</div>

<script>
const MIN = 1, MAX = 40;
function pct(l) { return ((l - MIN) / (MAX - MIN)) * 100; }

const ARCS = [
  { id:'A01', name:'Arc 1',  short:'Fil transversal', color:'#1A2E4A', start:1,  end:40, actes:[{n:1,l:'Acte I',s:1,e:8},{n:2,l:'Acte II',s:9,e:15},{n:3,l:'Acte III',s:16,e:25},{n:4,l:'Acte IV',s:26,e:34},{n:5,l:'Acte V',s:35,e:40}], tags:['Transversal'], quetes:[{id:'A01-01',niv:'1–5'},{id:'A01-02',niv:'1–5'},{id:'A01-03',niv:'3–7'},{id:'A01-04',niv:'5–10'},{id:'A01-05',niv:'8–14'},{id:'A01-06',niv:'10–16'},{id:'A01-07',niv:'12–18'},{id:'A01-08',niv:'20–25'}] },
  { id:'A02', name:'Arc 2',  short:'Justice sociale',  color:'#8B1A1A', start:1,  end:20, actes:[{n:1,l:'Acte I',s:1,e:7},{n:2,l:'Acte II',s:8,e:14},{n:3,l:'Acte III',s:15,e:20}], tags:['Bas niveau'], quetes:[{id:'A02-01',niv:'1–4'},{id:'A02-02',niv:'3–7'},{id:'A02-03',niv:'5–10'},{id:'A02-04',niv:'8–14'},{id:'A02-05',niv:'12–18'},{id:'A02-06',niv:'15–20'}] },
  { id:'A03', name:'Arc 3',  short:'Menace cosmique',  color:'#3D2A5A', start:10, end:40, actes:[{n:1,l:'Acte I',s:10,e:15},{n:2,l:'Acte II',s:16,e:24},{n:3,l:'Acte III',s:25,e:34},{n:4,l:'Acte IV',s:35,e:40}], tags:['Milieu','Final'], quetes:[{id:'A03-01',niv:'10–14'},{id:'A03-02',niv:'14–18'},{id:'A03-03',niv:'16–22'},{id:'A03-04',niv:'25–35'},{id:'A03-05',niv:'28–40'}] },
  { id:'A04', name:'Arc 4',  short:'Réseau souterrain', color:'#7B3F2A', start:5,  end:35, actes:[{n:1,l:'Acte I',s:5,e:12},{n:2,l:'Acte II',s:13,e:20},{n:3,l:'Acte III',s:21,e:28},{n:4,l:'Acte IV',s:29,e:35}], tags:['Milieu'], quetes:[{id:'A04-01',niv:'5–9'},{id:'A04-02',niv:'7–12'},{id:'A04-03',niv:'10–16'},{id:'A04-04',niv:'18–28'},{id:'A04-05',niv:'25–35'}] },
  { id:'A05', name:'Arc 5',  short:'Indépendance',     color:'#2A4A35', start:1,  end:15, actes:[{n:1,l:'Acte I',s:1,e:8},{n:2,l:'Acte II',s:9,e:15}], tags:['Bas niveau'], quetes:[{id:'A05-01',niv:'1–6'},{id:'A05-02',niv:'4–9'},{id:'A05-03',niv:'6–12'},{id:'A05-04',niv:'9–15'}] },
  { id:'A06', name:'Arc 6',  short:'Trois fronts',     color:'#9A6E1A', start:1,  end:30, actes:[{n:1,l:'Acte I',s:1,e:10},{n:2,l:'Acte II',s:10,e:20},{n:3,l:'Acte III',s:20,e:25},{n:4,l:'Acte IV',s:25,e:30}], tags:['Milieu'], quetes:[{id:'A06-01',niv:'3–8'},{id:'A06-02',niv:'10–15'},{id:'A06-03',niv:'20–24'},{id:'A06-04',niv:'24–30'}] },
  { id:'A07', name:'Arc 7',  short:'Institution',      color:'#4A3020', start:5,  end:30, actes:[{n:1,l:'Acte I',s:5,e:12},{n:2,l:'Acte II',s:13,e:22},{n:3,l:'Acte III',s:23,e:30}], tags:['Milieu'], quetes:[{id:'A07-01',niv:'5–10'},{id:'A07-02',niv:'10–18'},{id:'A07-03',niv:'14–22'},{id:'A07-04',niv:'20–30'}] },
  { id:'A08', name:'Arc 8',  short:'Joueurs volants',  color:'#1A4A4A', start:5,  end:35, actes:[{n:1,l:'Acte I',s:5,e:12},{n:2,l:'Acte II',s:12,e:20},{n:3,l:'Acte III',s:20,e:28},{n:4,l:'Acte IV',s:28,e:35}], tags:['Milieu','Joueurs volants'], quetes:[{id:'A08-01',niv:'5–15'},{id:'A08-02',niv:'5–14'},{id:'A08-03',niv:'10–22'},{id:'A08-04',niv:'8–20'},{id:'A08-05',niv:'18–30'}] },
  { id:'A09', name:'Arc 9',  short:'Révélation longue', color:'#2A2A5A', start:3, end:40, actes:[{n:1,l:'Acte I',s:3,e:7},{n:2,l:'Acte II',s:8,e:13},{n:3,l:'Acte III',s:11,e:16},{n:4,l:'Acte IV',s:15,e:22},{n:5,l:'Acte V',s:22,e:28}], tags:['Transversal','Final'], quetes:[{id:'A09-01',niv:'3–7'},{id:'A09-02',niv:'8–13'},{id:'A09-03',niv:'11–16'},{id:'A09-04',niv:'15–22'},{id:'A09-05',niv:'22–28'}] },
  { id:'A10', name:'Arc 10', short:'Exploration',      color:'#4A2A1A', start:10, end:35, actes:[{n:1,l:'Acte I',s:10,e:18},{n:2,l:'Acte II',s:19,e:27},{n:3,l:'Acte III',s:28,e:35}], tags:['Milieu'], quetes:[{id:'A10-01',niv:'10–15'},{id:'A10-02',niv:'13–18'},{id:'A10-03',niv:'18–27'},{id:'A10-04',niv:'28–35'}] },
  { id:'A11', name:'Arc 11', short:'Territoire',       color:'#5A4A2A', start:5,  end:40, actes:[{n:1,l:'Acte I',s:5,e:12},{n:2,l:'Acte II',s:13,e:22},{n:3,l:'Acte III',s:23,e:32},{n:4,l:'Acte IV',s:33,e:40}], tags:['Transversal','Final'], quetes:[{id:'A11-01',niv:'5–10'},{id:'A11-02',niv:'10–18'},{id:'A11-03',niv:'13–22'},{id:'A11-04',niv:'20–32'},{id:'A11-05',niv:'25–35'},{id:'A11-06',niv:'33–40'}] },
];

const ALL_TAGS = ['Transversal','Bas niveau','Milieu','Final','Joueurs volants'];

// Ruler
const rulerEl = document.getElementById('ruler-ticks');
for (let l = 1; l <= 40; l++) {
  const t = document.createElement('div');
  const major = l % 5 === 0 || l === 1;
  t.className = 'tick' + (major ? ' major' : '');
  const m = document.createElement('div'); m.className = 'tick-mark'; t.appendChild(m);
  if (major || l === 1) t.append(String(l));
  rulerEl.appendChild(t);
}

// Filters
let activeFilter = 'all';
const filtersEl = document.getElementById('filters');
[{ label: 'Tous les arcs', val: 'all' }, ...ALL_TAGS.map(t => ({ label: t, val: t }))].forEach(({ label, val }) => {
  const b = document.createElement('button');
  b.className = 'filter-btn' + (val === 'all' ? ' active' : '');
  b.textContent = label;
  b.onclick = () => {
    activeFilter = val;
    filtersEl.querySelectorAll('.filter-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.arc-row').forEach(row => {
      const arc = ARCS.find(a => a.id === row.dataset.id);
      row.classList.toggle('hidden', val !== 'all' && !(arc?.tags || []).includes(val));
    });
  };
  filtersEl.appendChild(b);
});

// Timeline
const timeline = document.getElementById('timeline');
ARCS.forEach((arc, idx) => {
  const row = document.createElement('div');
  row.className = 'arc-row'; row.dataset.id = arc.id;

  const nameDiv = document.createElement('div');
  nameDiv.className = 'arc-name';
  nameDiv.innerHTML = arc.name + '<small>' + arc.short + '</small>';

  const track = document.createElement('div');
  track.className = 'arc-track';

  const totalW = pct(arc.end) - pct(arc.start);
  const totalSpan = arc.end - arc.start;

  arc.actes.forEach(a => {
    const seg = document.createElement('div');
    seg.className = 'acte-seg';
    const l = pct(a.s), w = pct(a.e + 1) - pct(a.s);
    seg.style.cssText = `left:${l}%;width:${w}%;background:${arc.color};opacity:${0.65 + a.n * 0.06};`;
    const lbl = document.createElement('div'); lbl.className = 'acte-seg-label'; lbl.textContent = a.l;
    seg.appendChild(lbl);
    seg.onclick = () => openPanel(arc, a);
    track.appendChild(seg);
  });

  row.appendChild(nameDiv); row.appendChild(track);
  timeline.appendChild(row);
  if (idx < ARCS.length - 1) { const sep = document.createElement('hr'); sep.className = 'arc-group-sep'; timeline.appendChild(sep); }
});

// Legend
const legendEl = document.getElementById('legend');
ARCS.forEach(arc => {
  const item = document.createElement('div'); item.className = 'legend-item';
  item.innerHTML = `<div class="legend-swatch" style="background:${arc.color}"></div>${arc.name}`;
  legendEl.appendChild(item);
});

// Panel
const overlay = document.getElementById('panel-overlay');
document.getElementById('panel-close').onclick = () => overlay.classList.remove('open');
overlay.onclick = e => { if (e.target === overlay) overlay.classList.remove('open'); };

function openPanel(arc, acte) {
  document.getElementById('panel-content').innerHTML = `
    <span class="panel-badge" style="background:${arc.color}">${arc.id}</span>
    <h2>${arc.name}</h2>
    <div class="panel-levels">Niveaux ${arc.start}–${arc.end} · ${arc.actes.length} actes</div>

    <div class="panel-sec-title">Actes</div>
    ${arc.actes.map(a => `
      <div class="acte-detail" style="background:${arc.color}12;border-color:${arc.color}">
        <strong style="font-size:0.82rem">${a.l}</strong>
        <span style="font-size:0.78rem;color:var(--ink-light);margin-left:8px">Niv. ${a.s}–${a.e}</span>
      </div>`).join('')}

    <div class="panel-sec-title">Quêtes (${arc.quetes.length})</div>
    <div class="quete-list">
      ${arc.quetes.map(q => `
        <div class="quete-item">
          <span class="quete-id">${q.id}</span>
          <span class="quete-lvl">Niv. ${q.niv}</span>
        </div>`).join('')}
    </div>
  `;
  overlay.classList.add('open');
}
</script>
</body>
</html>
